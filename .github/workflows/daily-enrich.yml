name: Daily DB Enrichment

on:
  schedule:
    - cron: '0 3 * * *'   # 3h00 UTC chaque nuit
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (aucune écriture en BDD)'
        type: boolean
        default: false
      limit:
        description: "Nombre max d'albums par phase (vide = tout traiter)"
        type: string
        required: false

jobs:
  enrich:
    name: Enrich missing data
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run enrichment script
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          node scripts/enrich-missing.mjs $ARGS

      # album_stats_mat n'a aucun mécanisme de refresh natif (pas de pg_cron
      # en place) — sans cet appel, ses stats (avg_rating/listeners_count,
      # utilisées par curator.ts/explore.ts) restent figées indéfiniment.
      - name: Refresh album_stats_mat
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/rpc/refresh_album_stats_mat" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{}"

      # Le nettoyage de l'avatar à la suppression d'un compte n'existe qu'en
      # TypeScript (deleteAccount(), Settings) — une suppression depuis le
      # dashboard Supabase Auth le contourne et laisse le fichier orphelin.
      # Un trigger SQL direct sur storage.objects est impossible (bloqué par
      # storage.protect_delete()), d'où ce nettoyage périodique via la Storage API.
      - name: Cleanup orphaned avatars
        if: ${{ inputs.dry_run != true }}
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/cleanup-orphaned-avatars.mjs --apply

      # Filet de rattrapage pour les albums créés sans canonical_key par des
      # chemins d'écriture hors importAlbumFromMusicBrainz (notamment le worker
      # process-external-imports.mjs, qui tourne en continu sur des titres bruts
      # Last.fm/RYM). Sans ce step, les doublons réintroduits entre deux audits
      # manuels restent invisibles indéfiniment — voir MUSICBRAINZ_PIPELINE_HANDOFF.md.
      - name: Backfill canonical keys
        if: ${{ inputs.dry_run != true }}
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/backfill-canonical-keys.mjs

      # Dry-run uniquement, jamais --apply : le script lui-même cascade-supprime
      # curator_picks/list_items sans bloquer même quand il les détecte (juste un
      # warning dans les logs) — une revue humaine avant --apply est documentée
      # comme requise. Ce step sert d'alerte (visible dans les logs du run) pour
      # savoir qu'un nettoyage manuel est à faire, pas pour l'automatiser à l'aveugle.
      - name: Report duplicate album groups (dry-run, no write)
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/reconcile-duplicate-albums.mjs

      # Étape séparée (curl, pas de dépendance npm) : survit même si "Install
      # dependencies" plante avant que le script Node ne démarre — c'est ce qui
      # s'est produit silencieusement 5 nuits de suite en juin 2026 (lockfile
      # désynchronisé). L'admin affiche un avertissement si ce ping est absent
      # ou en échec depuis plus de 36h.
      - name: Report cron health
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" != "success" ]; then STATUS="failure"; fi
          curl -s -o /dev/null -X POST "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/cron_health" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"job_name\": \"daily-enrich\", \"status\": \"$STATUS\", \"last_run_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
