name: Daily DB Enrichment

on:
  schedule:
    - cron: '0 3 * * *'   # 3h00 UTC chaque nuit
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (aucune écriture en BDD)'
        type: boolean
        default: false
      limit:
        description: "Nombre max d'albums par phase (vide = tout traiter)"
        type: string
        required: false

jobs:
  enrich:
    name: Enrich missing data
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run enrichment script
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          node scripts/enrich-missing.mjs $ARGS

      # Étape séparée (curl, pas de dépendance npm) : survit même si "Install
      # dependencies" plante avant que le script Node ne démarre — c'est ce qui
      # s'est produit silencieusement 5 nuits de suite en juin 2026 (lockfile
      # désynchronisé). L'admin affiche un avertissement si ce ping est absent
      # ou en échec depuis plus de 36h.
      - name: Report cron health
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" != "success" ]; then STATUS="failure"; fi
          curl -s -o /dev/null -X POST "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/cron_health" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"job_name\": \"daily-enrich\", \"status\": \"$STATUS\", \"last_run_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
