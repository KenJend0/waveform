name: ML Batch Pipeline

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC
  workflow_dispatch:        # manual trigger from GitHub UI
    inputs:
      dry_run:
        description: "Run all steps with --dry-run (no writes to Supabase)"
        type: boolean
        default: false

jobs:
  compute:
    name: Compute vectors + recommendations
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      DRY_RUN_FLAG: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Step 1 — Compute user taste vectors & cosine similarity
        run: python ml/scripts/compute_user_vectors.py $DRY_RUN_FLAG

      - name: Step 2 — Backfill genres (albums sans données genre)
        # Skipped en dry-run : même avec --dry-run, ce script interroge MusicBrainz en vrai
        # (seule l'écriture Supabase est sautée) — inutile pour valider les étapes 1/3/4/5.
        if: ${{ env.DRY_RUN_FLAG == '' }}
        run: python ml/scripts/backfill_genres.py --limit 200

      - name: Step 3 — Compute album recommendations (cosine CF)
        run: python ml/scripts/compute_recommendations.py --method cosine_cf $DRY_RUN_FLAG

      - name: Step 4 — Compute track recommendations (cosine CF)
        run: python ml/scripts/compute_track_recommendations.py --method cosine_cf $DRY_RUN_FLAG

      - name: Step 5 — Compute hybrid recommendations (cosine CF + genre content)
        run: python ml/scripts/compute_hybrid_recommendations.py --method hybrid $DRY_RUN_FLAG

  evaluate:
    name: Evaluate metrics
    runs-on: ubuntu-latest
    needs: compute          # run after compute succeeds
    timeout-minutes: 15
    # Only evaluate on schedule (not every manual trigger, to avoid spam)
    if: github.event_name == 'schedule'

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Evaluate Precision@K, Recall@K, NDCG@K
        run: python ml/scripts/evaluate_metrics.py --method cosine_cf --k 5,10,20
