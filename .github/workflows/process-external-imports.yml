name: Process External Imports

on:
  # Filet de sécurité — le déclenchement normal est désormais un workflow_dispatch
  # tiré par l'app à chaque import lancé (cf. lib/githubDispatch.ts), donc le cron
  # n'a plus besoin de tourner toutes les 15 min pour un volume d'imports faible.
  # Cette planification ne fait que rattraper les cas où le dispatch a échoué
  # silencieusement (token absent/expiré, panne GitHub) — d'où l'intervalle large.
  schedule:
    - cron: '37 * * * *'   # toutes les heures, décalé de la minute ronde (contention GitHub Actions)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (aucune écriture en BDD)'
        type: boolean
        default: false
      limit:
        description: "Nombre max d'imports traités"
        type: string
        required: false

# Un seul run à la fois — process-external-imports.mjs n'a pas de verrou de ligne sur
# external_imports, donc deux runs concurrents (ex: deux imports lancés à quelques
# secondes d'intervalle) pourraient retraiter la même ligne en double. queue (pas
# cancel-in-progress) pour ne perdre aucun déclenchement, juste les sérialiser.
concurrency:
  group: process-external-imports
  cancel-in-progress: false

jobs:
  process:
    name: Reprendre les imports Last.fm/RYM stale
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run import processing script
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          node scripts/process-external-imports.mjs $ARGS

      - name: Report cron health
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" != "success" ]; then STATUS="failure"; fi
          curl -s -o /dev/null -X POST "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/cron_health" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"job_name\": \"process-external-imports\", \"status\": \"$STATUS\", \"last_run_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
